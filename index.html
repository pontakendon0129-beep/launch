<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>LAUNCH — ツール</title>
<meta name="description" content="YouTubeチャンネル「LAUNCH」が視聴者のために無料配布しているアプリの入り口です。">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LAUNCH">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23161616'/%3E%3Cg transform='translate(17.8,4) scale(0.395)'%3E%3Cpath fill='%23fff' d='M9 31 Q13 24 22 21 L24 13 Q25 9 33 8 L45 9 Q50 11 51 17 Q60 19 63 24 Q64 28 59 28 Q36 20 16 34 Q10 35 9 31 Z'/%3E%3Cpath fill='%23fff' d='M20 44 Q22 37 30 32 L34 43 Q38 34 44 30 Q52 33 55 42 Q60 62 57 91 L14 93 Q10 68 15 52 Q16 47 20 44 Z'/%3E%3Cpath fill='none' stroke='%23161616' stroke-width='2.5' stroke-linecap='round' d='M15 56 Q28 58 35 66 Q39 71 37 77'/%3E%3C/g%3E%3Ctext x='32' y='58' font-family='Helvetica,Arial' font-size='9' font-weight='bold' letter-spacing='0.6' fill='%23fff' text-anchor='middle'%3ELAUNCH%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23161616'/%3E%3Cg transform='translate(17.8,4) scale(0.395)'%3E%3Cpath fill='%23fff' d='M9 31 Q13 24 22 21 L24 13 Q25 9 33 8 L45 9 Q50 11 51 17 Q60 19 63 24 Q64 28 59 28 Q36 20 16 34 Q10 35 9 31 Z'/%3E%3Cpath fill='%23fff' d='M20 44 Q22 37 30 32 L34 43 Q38 34 44 30 Q52 33 55 42 Q60 62 57 91 L14 93 Q10 68 15 52 Q16 47 20 44 Z'/%3E%3Cpath fill='none' stroke='%23161616' stroke-width='2.5' stroke-linecap='round' d='M15 56 Q28 58 35 66 Q39 71 37 77'/%3E%3C/g%3E%3Ctext x='32' y='58' font-family='Helvetica,Arial' font-size='9' font-weight='bold' letter-spacing='0.6' fill='%23fff' text-anchor='middle'%3ELAUNCH%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #f4f3f0;
    --card: #ffffff;
    --ink: #161616;
    --sub: #8b8880;
    --faint: #b9b6af;
    --line: #e8e6e1;
    --radius: 18px;
    --shadow: 0 1px 2px rgba(22,22,22,0.04), 0 8px 24px rgba(22,22,22,0.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.65;
    max-width: 480px; margin: 0 auto; min-height: 100vh;
    padding: 0 0 calc(28px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased; font-feature-settings: "palt";
  }

  /* ===== LAUNCHロゴ（探偵シルエット）共通定義 ===== */
  .lb-mark { width: 30px; height: 40px; }

  /* ===== ヘッダー ===== */
  header {
    padding: 26px 24px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .launch-brand {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--ink);
  }
  .launch-brand:active { opacity: 0.6; }
  .lb-text {
    font-family: Helvetica, Arial, sans-serif;
    font-weight: 800; font-size: 1.05rem; letter-spacing: 0.16em;
  }
  .lb-yt { width: 26px; height: 19px; margin-left: 2px; flex-shrink: 0; }

  /* ===== ヒーロー ===== */
  .hero { padding: 18px 24px 8px; }
  .hero h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: 0.02em; }
  .hero p { margin-top: 10px; font-size: 0.82rem; color: var(--sub); line-height: 1.9; }

  /* ===== アプリ一覧 ===== */
  main { padding: 8px 20px 0; }
  .sec-label {
    font-size: 0.64rem; letter-spacing: 0.2em; color: var(--faint);
    padding: 20px 4px 10px; text-transform: uppercase; font-weight: 700;
  }
  .app-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 16px 16px; margin-bottom: 12px;
    text-decoration: none; color: var(--ink);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .app-card:active { transform: scale(0.985); }
  .ac-ico {
    width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .ac-ico svg { width: 26px; height: 26px; }
  .ac-body { flex: 1; min-width: 0; }
  .ac-name { font-size: 1rem; font-weight: 700; }
  .ac-book { font-size: 0.74rem; color: var(--sub); margin-top: 2px; }
  .ac-go {
    flex-shrink: 0; font-size: 0.72rem; font-weight: 700; color: var(--sub);
    display: flex; align-items: center; gap: 3px;
  }
  .ac-go svg { width: 15px; height: 15px; }

  .app-card.soon {
    background: transparent; border-style: dashed; box-shadow: none;
    color: var(--faint); cursor: default;
  }
  .app-card.soon .ac-ico { background: var(--line); color: var(--faint); }
  .app-card.soon .ac-name { color: var(--sub); font-weight: 600; }

  /* ===== 追加のヒント ===== */
  .add-hint {
    margin: 14px 4px 0; padding: 14px 16px;
    background: rgba(22,22,22,0.03); border-radius: 14px;
    font-size: 0.74rem; color: var(--sub); line-height: 1.9;
  }
  .add-hint b { color: var(--ink); font-weight: 700; }

  /* ===== フッター ===== */
  footer {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 34px 0 8px; color: var(--faint);
    font-size: 0.58rem; letter-spacing: 0.22em;
  }
  footer .lb-mark { width: 14px; height: 19px; color: var(--sub); }
  footer .lb-text { font-size: 0.66rem; color: var(--sub); letter-spacing: 0.16em; }
</style>
</head>
<body>

<!-- LAUNCHロゴ（探偵シルエット）共通定義 -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="launch-mark" viewBox="0 0 72 96">
    <path fill="currentColor" d="M9 31 Q13 24 22 21 L24 13 Q25 9 33 8 L45 9 Q50 11 51 17 Q60 19 63 24 Q64 28 59 28 Q36 20 16 34 Q10 35 9 31 Z"/>
    <path fill="currentColor" d="M20 44 Q22 37 30 32 L34 43 Q38 34 44 30 Q52 33 55 42 Q60 62 57 91 L14 93 Q10 68 15 52 Q16 47 20 44 Z"/>
    <path fill="none" stroke="var(--bg, #f4f3f0)" stroke-width="2.5" stroke-linecap="round" d="M15 56 Q28 58 35 66 Q39 71 37 77"/>
    <path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.3" d="M61 36 Q66 62 62 90"/>
  </symbol>
</svg>

<header>
  <a class="launch-brand" href="https://www.youtube.com/@launch-jp" target="_blank" rel="noopener" aria-label="YouTubeチャンネル LAUNCH を開く">
    <svg class="lb-mark"><use href="#launch-mark"/></svg>
    <span class="lb-text">LAUNCH</span>
    <svg class="lb-yt" viewBox="0 0 28 20" aria-hidden="true">
      <rect x="0" y="0" width="28" height="20" rx="5" fill="#FF0000"/>
      <path d="M11 6 L19 10 L11 14 Z" fill="#fff"/>
    </svg>
  </a>
</header>

<section class="hero">
  <h1>LAUNCH ツール</h1>
  <p>YouTubeチャンネル「LAUNCH」が、<br>視聴者のために無料でつくっているアプリ集です。<br>気になるものをタップして開いてください。</p>
</section>

<main>
  <!-- ============ アプリ一覧。新しいアプリを作ったら、この <a class="app-card"> を1つ足すだけ ============ -->
  <div class="sec-label">アプリ</div>

  <a class="app-card" href="./168/">
    <span class="ac-ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 3.5V12l6 6"/></svg>
    </span>
    <span class="ac-body">
      <span class="ac-name">168 — 時間記録</span>
      <span class="ac-book">『168 Hours』</span>
    </span>
    <span class="ac-go">開く<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
  </a>

  <!-- 例）2本目以降はこのブロックをコピーして中身を変えるだけ：
  <a class="app-card" href="./アプリ名/">
    <span class="ac-ico"><svg ...アイコン...></svg></span>
    <span class="ac-body">
      <span class="ac-name">（アプリ名）</span>
      <span class="ac-book">（原著名）</span>
    </span>
    <span class="ac-go">開く<svg ...></svg></span>
  </a>
  -->

  <div class="app-card soon">
    <span class="ac-ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </span>
    <span class="ac-body">
      <span class="ac-name">次のツール</span>
      <span class="ac-book">Coming Soon…</span>
    </span>
  </div>

  <div class="add-hint">
    このページを開いたまま <b>「ホーム画面に追加」</b> しておくと、<br>
    ワンタップでLAUNCHのアプリ一覧を開けます。
  </div>
</main>

<footer>
  <span class="lb-mark"><svg width="14" height="19" viewBox="0 0 72 96"><use href="#launch-mark"/></svg></span>
  <span class="lb-text">LAUNCH</span>
</footer>

</body>
</html>
